name: build-jar

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Rendre gradlew exécutable
        run: chmod +x gradlew

      - name: Compiler le projet et créer le Jar
        run: ./gradlew fatJar

      - name: Sauvegarder le Jar en Artefact
        uses: actions/upload-artifact@v4
        with:
          name: Application-MessageApp
          path: build/libs/*-all.jar